name: Portfolio CD Pipeline

on:
  workflow_run:
    workflows:
      - Portfolio CI Pipeline
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/zaid-devops-portfolio:latest

            sudo docker stop portfolio || true
            sudo docker rm portfolio || true

            sudo docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/zaid-devops-portfolio:latest

            sudo docker ps

            curl --fail http://localhost
